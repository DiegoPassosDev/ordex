services:
  postgres:
    image: postgres:16
    container_name: ordex_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordex_db
    ports:
      - "5433:5432"
    volumes:
      - ordex_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ordex_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ordex_redis_data:/data

volumes:
  ordex_postgres_data:
  ordex_redis_data: